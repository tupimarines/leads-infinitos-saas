

services:
  # Roda uma vez por deploy: schema/init_db SEM workers concorrentes (evita deadlock no LOCK/DDL).
  migrate:
    build: .
    container_name: "leads_infinitos_migrate"
    command: python scripts/run_migrate_db.py
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-leads_infinitos}
      - REDIS_URL=${REDIS_URL}
      - UAZAPI_URL=${UAZAPI_URL}
      - UAZAPI_ADMIN_TOKEN=${UAZAPI_ADMIN_TOKEN}
    networks:
      - dokploy-network
    restart: "no"

  web:
    build: .
    container_name: "leads_infinitos_web"
    ports:
      - "8000:8000"
    command: gunicorn -b 0.0.0.0:8000 --timeout 600 --worker-class sync --workers 1 --max-requests 100 --max-requests-jitter 10 --preload app:app
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - MEGA_API_URL=${MEGA_API_URL}
      - MEGA_API_TOKEN=${MEGA_API_TOKEN}
      - UAZAPI_URL=${UAZAPI_URL}
      - UAZAPI_ADMIN_TOKEN=${UAZAPI_ADMIN_TOKEN}
      - APIFY_TOKEN=${APIFY_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HOTMART_HOTTOK=${HOTMART_HOTTOK}
      - HOTMART_PRODUCT_ID=${HOTMART_PRODUCT_ID}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    volumes:
      - storage_data:/app/storage
    restart: always
    networks:
      - dokploy-network

  worker:
    build: .
    container_name: "leads_infinitos_worker"
    command: python worker.py
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - storage_data:/app/storage
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - MEGA_API_URL=${MEGA_API_URL}
      - MEGA_API_TOKEN=${MEGA_API_TOKEN}
      - UAZAPI_URL=${UAZAPI_URL}
      - UAZAPI_ADMIN_TOKEN=${UAZAPI_ADMIN_TOKEN}
      - APIFY_TOKEN=${APIFY_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HOTMART_HOTTOK=${HOTMART_HOTTOK}
      - HOTMART_PRODUCT_ID=${HOTMART_PRODUCT_ID}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    restart: always
    networks:
      - dokploy-network

  sender:
    build: .
    container_name: "leads_infinitos_sender"
    command: python worker_sender.py
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - storage_data:/app/storage
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - MEGA_API_URL=${MEGA_API_URL}
      - MEGA_API_TOKEN=${MEGA_API_TOKEN}
      - UAZAPI_URL=${UAZAPI_URL}
      - UAZAPI_ADMIN_TOKEN=${UAZAPI_ADMIN_TOKEN}
      - APIFY_TOKEN=${APIFY_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HOTMART_HOTTOK=${HOTMART_HOTTOK}
      - HOTMART_PRODUCT_ID=${HOTMART_PRODUCT_ID}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - CHATWOOT_API_URL=${CHATWOOT_API_URL}
      - CHATWOOT_ACCESS_TOKEN=${CHATWOOT_ACCESS_TOKEN}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID}
    restart: always
    networks:
      - dokploy-network

  cadence:
    build: .
    container_name: "leads_infinitos_cadence"
    command: python worker_cadence.py
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - storage_data:/app/storage
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - MEGA_API_URL=${MEGA_API_URL}
      - MEGA_API_TOKEN=${MEGA_API_TOKEN}
      - UAZAPI_URL=${UAZAPI_URL}
      - UAZAPI_ADMIN_TOKEN=${UAZAPI_ADMIN_TOKEN}
      - CHATWOOT_API_URL=${CHATWOOT_API_URL}
      - CHATWOOT_ACCESS_TOKEN=${CHATWOOT_ACCESS_TOKEN}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID}
    restart: always
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  storage_data:
    driver: local
